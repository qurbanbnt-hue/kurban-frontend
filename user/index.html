<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kurban Digital · Panitia</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* 补充样式：用于上传区域、预览等 */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--r-lg);
      padding: 24px;
      text-align: center;
      background: var(--bg);
      cursor: pointer;
      margin: 16px 0;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: var(--blue); }
    .preview-image {
      max-width: 100%;
      max-height: 200px;
      border-radius: var(--r-md);
      margin-top: 12px;
    }
    .file-list { margin-top: 12px; }
    .file-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: var(--white);
      border-radius: var(--r-sm);
      margin-bottom: 6px;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    .detail-row {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-label { width: 100px; color: var(--muted); font-weight: 500; }
    .detail-value { flex: 1; font-weight: 600; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: var(--bg);
      border-radius: var(--pill);
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    .tab.active {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }
    .btn {
      padding: 12px 20px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: var(--pill);
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--blue);
      color: var(--blue);
    }
  </style>
</head>

  <!-- 底部导航 -->
  <div class="u-nav">
    <button class="nav-item on" data-screen="beranda"><span class="ni">🏠</span>Beranda</button>
    <button class="nav-item" data-screen="hewan"><span class="ni">📋</span>Hewan</button>
    <button class="nav-item" data-screen="upload"><span class="ni">📸</span>Upload</button>
    <button class="nav-item" data-screen="dokumentasi"><span class="ni">📂</span>Dok</button>
    <button class="nav-item" data-screen="akun"><span class="ni">👤</span>Akun</button>

<script src="../assets/js/api.js"></script>
<script>
  (function(){
    // ---------- 全局变量 ----------
    let allHewan = [];
    let selectedHewan = null;
    let currentUploadTab = 'hidup';
    let dokInstansiList = [];

    const email = localStorage.getItem('userEmail');
    const username = localStorage.getItem('username') || email.split('@')[0];
    const role = localStorage.getItem('userRole');

    if (!email) window.location.href = '/';

    // 设置头部信息
    document.getElementById('userName').textContent = username;
    document.getElementById('avatarInitial').textContent = username.charAt(0).toUpperCase();

    // ---------- 辅助函数 ----------
    function getEmoji(jenis) {
      const j = (jenis || '').toLowerCase();
      if (j.includes('kambing')||j.includes('domba')) return '🐑';
      if (j.includes('kerbau')) return '🐃';
      return '🐄';
    }

    function getPhaseCount(status) {
      return [status.url_hidup, status.url_ditumbangkan, status.url_mati].filter(Boolean).length;
    }

    // ---------- 加载所有动物数据 ----------
    async function loadAllHewan() {
      const result = await callApi('getHewan', { email });
      if (result.success) {
        allHewan = result.data;
        return allHewan;
      }
      return [];
    }

    // ---------- 屏幕切换 ----------
    const screens = {
      beranda: document.getElementById('screen-beranda'),
      hewan: document.getElementById('screen-hewan'),
      upload: document.getElementById('screen-upload'),
      dokumentasi: document.getElementById('screen-dokumentasi'),
      akun: document.getElementById('screen-akun')
    };

    function switchScreen(screenId) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[screenId].classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
      document.querySelector(`.nav-item[data-screen="${screenId}"]`).classList.add('on');

      // 加载对应屏幕数据
      if (screenId === 'beranda') renderBeranda();
      else if (screenId === 'hewan') renderHewanList();
      else if (screenId === 'upload') renderUploadScreen();
      else if (screenId === 'dokumentasi') renderDokScreen();
      else if (screenId === 'akun') renderAkunScreen();
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => switchScreen(item.dataset.screen));
    });

    // ---------- 渲染仪表盘 ----------
    async function renderBeranda() {
      const hewan = await loadAllHewan();
      const total = hewan.length;
      const hidup = hewan.filter(h => h.status.url_hidup).length;
      const tumbang = hewan.filter(h => h.status.url_ditumbangkan).length;
      const mati = hewan.filter(h => h.status.url_mati).length;
      const selesai = hewan.filter(h => getPhaseCount(h.status) === 3).length;
      const proses = total - selesai;

      document.getElementById('totalHewan').textContent = total;
      document.getElementById('selesai').textContent = selesai;
      document.getElementById('proses').textContent = proses;

      let html = `
        <div class="u-content">
          <div class="quick-actions">
            <div class="qa-chip" data-action="hewan"><div class="qa-icon">📋</div><div class="qa-lbl">Daftar Hewan</div></div>
            <div class="qa-chip" data-action="upload"><div class="qa-icon">📸</div><div class="qa-lbl">Upload Foto</div></div>
            <div class="qa-chip" data-action="dok"><div class="qa-icon">📂</div><div class="qa-lbl">Dokumentasi</div></div>
          </div>
          <div class="phase-card">
            <div class="phase-title">📊 Progress Fase Dokumentasi</div>
            <div class="phase-steps">
              <div class="pstep"><div class="pstep-dot ${hidup>0?'done':''}">${hidup>0?'✓':'1'}</div><div class="pstep-lbl ${hidup>0?'done':''}">Hidup</div></div>
              <div class="pline ${hidup>0?'done':''}"></div>
              <div class="pstep"><div class="pstep-dot ${tumbang>0?'done':''}">${tumbang>0?'✓':'2'}</div><div class="pstep-lbl ${tumbang>0?'done':''}">Ditumbangkan</div></div>
              <div class="pline ${tumbang>0?'done':''}"></div>
              <div class="pstep"><div class="pstep-dot ${mati>0?'done':''}">${mati>0?'✓':'3'}</div><div class="pstep-lbl ${mati>0?'done':''}">Mati</div></div>
            </div>
            <div class="phase-counts">
              <div class="pc"><div class="pc-num">${hidup}</div><div class="pc-lbl">📷 Hidup</div></div>
              <div class="pc"><div class="pc-num">${tumbang}</div><div class="pc-lbl">🔪 Tumbang</div></div>
              <div class="pc"><div class="pc-num">${mati}</div><div class="pc-lbl">✅ Mati</div></div>
            </div>
          </div>
          <div class="ucard">
            <div class="card-head"><div class="card-title">🐮 Hewan Terbaru</div><span class="see-all" data-action="hewan">Lihat Semua →</span></div>
            ${hewan.slice(0,3).map(h => `
              <div class="a-row" data-nomor="${h.nomor_hewan}">
                <div class="a-ava ${h.jenis_hewan.includes('Kambing')?'green':''}">${getEmoji(h.jenis_hewan)}</div>
                <div class="a-info"><div class="aname">${h.nomor_hewan} · ${h.jenis_hewan}</div><div class="asub">${h.instansi} · ${h.wilayah}</div></div>
                <span class="abadge ${getPhaseCount(h.status)===3?'ab-done':getPhaseCount(h.status)===0?'ab-pend':'ab-prgs'}">${getPhaseCount(h.status)}/3</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      screens.beranda.innerHTML = html;
      attachBerandaEvents();
    }

    function attachBerandaEvents() {
      document.querySelectorAll('.qa-chip, .see-all').forEach(el => {
        el.addEventListener('click', () => {
          const action = el.dataset.action;
          if (action === 'hewan') switchScreen('hewan');
          else if (action === 'upload') switchScreen('upload');
          else if (action === 'dok') switchScreen('dokumentasi');
        });
      });
      document.querySelectorAll('.a-row').forEach(row => {
        row.addEventListener('click', () => {
          const nomor = row.dataset.nomor;
          selectedHewan = allHewan.find(h => h.nomor_hewan === nomor);
          if (selectedHewan) switchScreen('upload');
        });
      });
    }

    // ---------- 渲染动物列表 ----------
    async function renderHewanList() {
      const hewan = await loadAllHewan();
      let html = `<div class="u-content"><div class="search-chip" style="margin-bottom:16px;"><input type="text" id="searchInput" placeholder="Cari nomor, pekurban..." style="border:none;background:transparent;width:100%;outline:none;"></div>`;
      const renderList = (filter = '') => {
        const filtered = hewan.filter(h => 
          h.nomor_hewan.includes(filter) || h.daftar_pekurban.toLowerCase().includes(filter) || h.instansi.toLowerCase().includes(filter)
        );
        return filtered.map(h => `
          <div class="a-row" data-nomor="${h.nomor_hewan}">
            <div class="a-ava ${h.jenis_hewan.includes('Kambing')?'green':''}">${getEmoji(h.jenis_hewan)}</div>
            <div class="a-info"><div class="aname">${h.nomor_hewan} · ${h.jenis_hewan}</div><div class="asub">${h.instansi} · ${h.wilayah}</div></div>
            <span class="abadge ${getPhaseCount(h.status)===3?'ab-done':getPhaseCount(h.status)===0?'ab-pend':'ab-prgs'}">${getPhaseCount(h.status)}/3</span>
          </div>
        `).join('');
      };
      html += `<div id="hewanListContainer">${renderList()}</div></div>`;
      screens.hewan.innerHTML = html;

      const searchInput = document.getElementById('searchInput');
      const container = document.getElementById('hewanListContainer');
      searchInput.addEventListener('input', (e) => {
        container.innerHTML = renderList(e.target.value.toLowerCase());
        attachHewanRowEvents();
      });
      attachHewanRowEvents();
    }

    function attachHewanRowEvents() {
      document.querySelectorAll('#hewanListContainer .a-row').forEach(row => {
        row.addEventListener('click', () => {
          const nomor = row.dataset.nomor;
          selectedHewan = allHewan.find(h => h.nomor_hewan === nomor);
          if (selectedHewan) switchScreen('upload');
        });
      });
    }

    // ---------- 渲染上传屏幕 ----------
    function renderUploadScreen() {
      let html = `<div class="u-content">`;
      html += `<select id="hewanSelect" class="field" style="margin-bottom:16px;"><option value="">-- Pilih Hewan --</option>${allHewan.map(h => `<option value="${h.nomor_hewan}" ${selectedHewan && selectedHewan.nomor_hewan===h.nomor_hewan?'selected':''}>${h.nomor_hewan} - ${h.jenis_hewan}</option>`).join('')}</select>`;
      if (selectedHewan) {
        const s = selectedHewan.status;
        html += `
          <div class="ucard"><div class="card-title">Detail Hewan</div>
            <div class="detail-row"><span class="detail-label">Nomor</span><span class="detail-value">${selectedHewan.nomor_hewan}</span></div>
            <div class="detail-row"><span class="detail-label">Jenis</span><span class="detail-value">${selectedHewan.jenis_hewan}</span></div>
            <div class="detail-row"><span class="detail-label">Pekurban</span><span class="detail-value">${selectedHewan.daftar_pekurban}</span></div>
            <div class="detail-row"><span class="detail-label">Instansi</span><span class="detail-value">${selectedHewan.instansi}</span></div>
          </div>
          <div class="ucard">
            <div class="tabs">
              <div class="tab ${!s.url_hidup?'active':''}" data-tab="hidup">📷 Hidup</div>
              <div class="tab ${!s.url_ditumbangkan && s.url_hidup?'active':''}" data-tab="ditumbangkan">🔪 Ditumbangkan</div>
              <div class="tab ${!s.url_mati && s.url_ditumbangkan?'active':''}" data-tab="mati">✅ Mati</div>
            </div>
            <div class="upload-area" id="uploadArea">📸 Ketuk untuk pilih foto</div>
            <input type="file" id="fotoInput" accept="image/*" style="display:none;">
            <div id="previewContainer" style="display:none;"><img id="previewImg" class="preview-image"><button id="removePreview" class="btn-outline" style="margin-top:8px;">Hapus</button></div>
            <button class="btn" id="uploadBtn">Upload Foto</button>
          </div>
        `;
      }
      html += `</div>`;
      screens.upload.innerHTML = html;
      attachUploadEvents();
    }

    function attachUploadEvents() {
      const select = document.getElementById('hewanSelect');
      if (select) {
        select.addEventListener('change', (e) => {
          selectedHewan = allHewan.find(h => h.nomor_hewan === e.target.value);
          renderUploadScreen();
        });
      }
      const tabs = document.querySelectorAll('.tab');
      const uploadArea = document.getElementById('uploadArea');
      const fotoInput = document.getElementById('fotoInput');
      const previewContainer = document.getElementById('previewContainer');
      const previewImg = document.getElementById('previewImg');
      const removeBtn = document.getElementById('removePreview');
      const uploadBtn = document.getElementById('uploadBtn');

      if (tabs.length) {
        tabs.forEach(tab => tab.addEventListener('click', () => {
          currentUploadTab = tab.dataset.tab;
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
        }));
        // 设置默认active
        currentUploadTab = document.querySelector('.tab.active')?.dataset.tab || 'hidup';
      }

      if (uploadArea) {
        uploadArea.addEventListener('click', () => fotoInput.click());
        fotoInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              previewImg.src = ev.target.result;
              previewContainer.style.display = 'block';
              uploadArea.style.display = 'none';
            };
            reader.readAsDataURL(file);
          }
        });
        removeBtn.addEventListener('click', () => {
          previewContainer.style.display = 'none';
          uploadArea.style.display = 'block';
          fotoInput.value = '';
        });
      }

      if (uploadBtn) {
        uploadBtn.addEventListener('click', async () => {
          if (!selectedHewan) { alert('Pilih hewan'); return; }
          const file = fotoInput.files[0];
          if (!file) { alert('Pilih foto'); return; }
          const reader = new FileReader();
          reader.onload = async (e) => {
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Mengupload...';
            const base64 = e.target.result.split(',')[1];
            const result = await callApi('uploadFoto', {
              email, username, nomor_hewan: selectedHewan.nomor_hewan,
              jenis_foto: currentUploadTab, base64Data: base64, mimeType: file.type
            });
            if (result.success) {
              alert('Upload berhasil!');
              await loadAllHewan();
              selectedHewan = allHewan.find(h => h.nomor_hewan === selectedHewan.nomor_hewan);
              renderUploadScreen();
            } else {
              alert('Gagal: ' + result.error);
            }
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Upload Foto';
          };
          reader.readAsDataURL(file);
        });
      }
    }

    // ---------- 渲染文档屏幕 ----------
    async function renderDokScreen() {
      const hewan = await loadAllHewan();
      const instSet = new Set();
      hewan.forEach(h => { if (h.instansi && h.wilayah) instSet.add(JSON.stringify({instansi: h.instansi, wilayah: h.wilayah})); });
      dokInstansiList = Array.from(instSet).map(s => JSON.parse(s));
      let html = `<div class="u-content">`;
      html += `<select id="dokInstansiSelect" class="field"><option value="">-- Pilih Instansi --</option>${dokInstansiList.map(item => `<option value="${item.instansi}" data-wilayah="${item.wilayah}">${item.instansi} (${item.wilayah})</option>`).join('')}</select>`;
      html += `<input type="text" id="dokWilayah" class="field" placeholder="Wilayah" readonly>`;
      html += `<select id="dokJenis" class="field"><option value="Pencacahan">🔪 Pencacahan</option><option value="Penyaluran">📦 Penyaluran</option></select>`;
      html += `<div id="dokUploadCard" style="display:none;"><div class="upload-area" id="dokUploadArea">📁 Ketuk untuk pilih file (foto/video)</div><input type="file" id="dokFileInput" accept="image/*,video/*" multiple style="display:none;"><div id="dokFileList" class="file-list"></div><button class="btn" id="dokUploadBtn">Upload Dokumentasi</button></div>`;
      html += `<div class="ucard" style="margin-top:16px;"><div class="card-title">Riwayat Dokumentasi</div><div id="dokRiwayat"></div></div>`;
      html += `</div>`;
      screens.dokumentasi.innerHTML = html;
      attachDokEvents();
      loadDokRiwayat();
    }

    function attachDokEvents() {
      const select = document.getElementById('dokInstansiSelect');
      const wilayahInput = document.getElementById('dokWilayah');
      const uploadCard = document.getElementById('dokUploadCard');
      const dokArea = document.getElementById('dokUploadArea');
      const dokInput = document.getElementById('dokFileInput');
      const fileListDiv = document.getElementById('dokFileList');
      const uploadBtn = document.getElementById('dokUploadBtn');

      select.addEventListener('change', function() {
        const opt = this.options[this.selectedIndex];
        if (opt.value) {
          wilayahInput.value = opt.dataset.wilayah;
          uploadCard.style.display = 'block';
        } else {
          wilayahInput.value = '';
          uploadCard.style.display = 'none';
        }
      });

      dokArea.addEventListener('click', () => dokInput.click());
      dokInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        fileListDiv.innerHTML = files.map(f => `<div class="file-item">📄 ${f.name} (${(f.size/1024).toFixed(1)} KB)</div>`).join('');
      });

      uploadBtn.addEventListener('click', async () => {
        const instansi = select.value;
        const wilayah = wilayahInput.value;
        const jenis = document.getElementById('dokJenis').value;
        if (!instansi) { alert('Pilih instansi'); return; }
        const files = dokInput.files;
        if (files.length === 0) { alert('Pilih file'); return; }
        const filePromises = Array.from(files).map(f => new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = e => resolve({ base64Data: e.target.result.split(',')[1], mimeType: f.type, fileName: f.name });
          reader.readAsDataURL(f);
        }));
        uploadBtn.disabled = true;
        uploadBtn.textContent = 'Mengupload...';
        const fileData = await Promise.all(filePromises);
        const result = await callApi('uploadDokumentasi', { email, username, instansi, wilayah, jenis_dokumentasi: jenis, files: fileData });
        if (result.success) {
          alert(`Berhasil upload ${result.fotoCount} foto, ${result.videoCount} video`);
          dokInput.value = '';
          fileListDiv.innerHTML = '';
          loadDokRiwayat();
        } else {
          alert('Gagal: ' + result.error);
        }
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload Dokumentasi';
      });
    }

    async function loadDokRiwayat() {
      const result = await callApi('getDokumentasi', { email });
      const container = document.getElementById('dokRiwayat');
      if (result.success && result.data) {
        container.innerHTML = result.data.map(d => `
          <div class="detail-row">
            <div style="flex:1"><strong>${d.instansi} (${d.wilayah})</strong><br><small>${d.jenis} · ${d.tglUpload?new Date(d.tglUpload).toLocaleDateString('id-ID'):'-'}</small></div>
            <a href="${d.folderUrl}" target="_blank">📂 Buka</a>
          </div>
        `).join('') || '<p>Belum ada dokumentasi</p>';
      }
    }

    // ---------- 渲染账户屏幕 ----------
    function renderAkunScreen() {
      screens.akun.innerHTML = `
        <div class="u-content">
          <div class="ucard">
            <div class="card-title">Profil Saya</div>
            <div class="detail-row"><span class="detail-label">Username</span><span class="detail-value">${username}</span></div>
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${email}</span></div>
            <div class="detail-row"><span class="detail-label">Role</span><span class="detail-value">${role==='admin'?'Administrator':'Panitia'}</span></div>
          </div>
          <div class="ucard">
            <div class="card-title">Aplikasi</div>
            <p>Versi 2.0 · Yayasan Bhakti Nusa Tenggara</p>
          </div>
          <button class="btn-outline" style="width:100%; margin-top:16px;" onclick="logout()">🚪 Keluar</button>
        </div>
      `;
    }

    window.logout = function() {
      localStorage.clear();
      window.location.href = '/';
    };

    // 初始化
    (async function init() {
      await loadAllHewan();
      renderBeranda();
    })();

  })();
</script>
</body>
</html>
