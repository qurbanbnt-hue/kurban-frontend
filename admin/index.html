<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Kurban Digital</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <div class="admin-sidebar">
      <div class="admin-logo"><span>🐄</span> Kurban Digital</div>
      <ul class="sidebar-menu">
        <li class="sidebar-item active"><span>📊</span> Dashboard</li>
        <li class="sidebar-item"><span>👥</span> Pengguna</li>
        <li class="sidebar-item"><span>🐮</span> Hewan</li>
        <li class="sidebar-item"><span>📁</span> Dokumentasi</li>
        <li class="sidebar-item" onclick="logout()"><span>🚪</span> Keluar</li>
      </ul>
    </div>

    <div class="admin-main">
      <div class="admin-header">
        <h1>Dashboard Admin</h1>
        <div><span id="adminName"></span> · <a href="/" style="color:var(--primary);">User App</a></div>
      </div>

      <div class="admin-stats">
        <div class="stat-card"><div class="value" id="totalHewan">-</div><div class="label">Total Hewan</div></div>
        <div class="stat-card"><div class="value" id="totalUser">-</div><div class="label">Total Pengguna</div></div>
        <div class="stat-card"><div class="value" id="selesai">-</div><div class="label">Dokumentasi Selesai</div></div>
      </div>

      <div class="data-table">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
          <h3>Daftar Hewan</h3>
          <button class="btn-icon" onclick="loadAdminData()" title="Refresh">🔄</button>
        </div>
        <table>
          <thead><tr><th>Nomor</th><th>Jenis</th><th>Pekurban</th><th>Instansi</th><th>Wilayah</th></tr></thead>
          <tbody id="hewanTable"></tbody>
        </table>
      </div>

      <div class="data-table" style="margin-top:24px;">
        <h3 style="margin-bottom:20px;">Daftar Pengguna</h3>
        <table>
          <thead><tr><th>Email</th><th>Username</th><th>Role</th></tr></thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    const email = localStorage.getItem('userEmail');
    const role = localStorage.getItem('userRole');
    if (!email || role !== 'admin') window.location.href = '/';
    document.getElementById('adminName').textContent = localStorage.getItem('username') || email;

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    async function loadAdminData() {
      const result = await callApi('getAdminData', { email });
      if (result.success) {
        document.getElementById('totalHewan').textContent = result.stats.totalHewan;
        document.getElementById('totalUser').textContent = result.stats.totalUsers;
        document.getElementById('selesai').textContent = result.stats.selesai || 0;

        const hewanHtml = result.hewan.map(h => `<tr><td>${h.nomor_hewan}</td><td>${h.jenis_hewan}</td><td>${h.daftar_pekurban}</td><td>${h.instansi}</td><td>${h.wilayah}</td></tr>`).join('');
        document.getElementById('hewanTable').innerHTML = hewanHtml || '<tr><td colspan="5">Belum ada data</td></tr>';

        const userHtml = result.users.map(u => `<tr><td>${u.email}</td><td>${u.username}</td><td>${u.role}</td></tr>`).join('');
        document.getElementById('userTable').innerHTML = userHtml;
      }
    }

    loadAdminData();
  </script>
</body>
</html>
