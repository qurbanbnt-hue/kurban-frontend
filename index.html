<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurban Digital - Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* Portal choice modal */
    .portal-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .portal-modal.active {
      display: flex;
    }
    .portal-options {
      background: white;
      border-radius: 32px;
      padding: 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .portal-options h3 {
      font-size: 20px;
      margin-bottom: 16px;
      color: var(--primary-dark);
    }
    .portal-btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .portal-user {
      background: var(--primary);
      color: white;
    }
    .portal-admin {
      background: var(--gold);
      color: var(--text-dark);
    }
    .portal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <span>🐄</span>
        </div>
        <h1 class="login-title">Kurban Digital</h1>
        <p class="login-sub">Dokumentasi & Monitoring Hewan Kurban</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" class="form-control" id="email" placeholder="nama@email.com" required autocomplete="off">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-login user" id="loginBtn">Masuk</button>
        <div id="loginError" class="error-message"></div>
      </form>
    </div>
  </div>

  <!-- Portal Choice Modal (only for admin) -->
  <div class="portal-modal" id="portalModal">
    <div class="portal-options">
      <h3>Pilih Portal</h3>
      <p style="margin-bottom: 20px; color: var(--text-muted);">Anda login sebagai Administrator</p>
      <button class="portal-btn portal-user" id="goUserBtn">📱 Aplikasi User</button>
      <button class="portal-btn portal-admin" id="goAdminBtn">⚙️ Admin Panel</button>
      <button class="btn-outline" style="margin-top: 16px; width: 100%;" onclick="closePortalModal()">Batal</button>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    // Cek session existing
    (function checkExistingSession() {
      const email = localStorage.getItem('userEmail');
      const role = localStorage.getItem('userRole');
      const expiry = Number(localStorage.getItem('loginExpiry'));
      if (email && role && Date.now() < expiry) {
        if (role === 'admin') {
          showPortalModal(email);
        } else {
          window.location.replace('/user');
        }
      }
    })();

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');

    let pendingAdminEmail = null;
    let pendingUsername = null;

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        errorDiv.textContent = 'Email dan password harus diisi';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Memverifikasi...';
      errorDiv.textContent = '';

      try {
        const result = await callApi('login', { email, password });
        
        if (result.success) {
          // Simpan session
          localStorage.setItem('userEmail', result.email);
          localStorage.setItem('username', result.username);
          localStorage.setItem('userRole', result.role);
          localStorage.setItem('loginExpiry', Date.now() + (8 * 60 * 60 * 1000));

          if (result.role === 'admin') {
            // Tampilkan pilihan portal
            pendingAdminEmail = result.email;
            pendingUsername = result.username;
            showPortalModal(result.username || result.email);
          } else {
            // User biasa: langsung ke user app
            window.location.replace('/user');
          }
        } else {
          throw new Error(result.error || 'Login gagal');
        }
      } catch (err) {
        errorDiv.textContent = err.message;
        loginBtn.disabled = false;
        loginBtn.textContent = 'Masuk';
      }
    });

    function showPortalModal(displayName) {
      document.getElementById('portalModal').classList.add('active');
      // Reset form untuk keamanan
      emailInput.value = '';
      passwordInput.value = '';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Masuk';
    }

    function closePortalModal() {
      document.getElementById('portalModal').classList.remove('active');
      // Jika user cancel, logout (clear session)
      localStorage.clear();
      pendingAdminEmail = null;
      pendingUsername = null;
    }

    document.getElementById('goUserBtn').addEventListener('click', () => {
      window.location.replace('/user');
    });

    document.getElementById('goAdminBtn').addEventListener('click', () => {
      window.location.replace('/admin');
    });

    // Jika modal ditutup dengan klik di luar (opsional)
    document.getElementById('portalModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('portalModal')) {
        closePortalModal();
      }
    });
  </script>
</body>
</html>
