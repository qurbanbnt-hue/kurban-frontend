<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurban Digital - Portal Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <span>🐄</span>
        </div>
        <h1 class="login-title">Kurban Digital</h1>
        <p class="login-sub">Dokumentasi & Monitoring Hewan Kurban</p>
      </div>

      <!-- Portal Tabs -->
      <div class="portal-tabs">
        <button class="portal-tab user active" id="tabUser" data-portal="user">📱 Aplikasi User</button>
        <button class="portal-tab admin" id="tabAdmin" data-portal="admin">⚙️ Admin Panel</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" class="form-control" id="email" placeholder="nama@email.com" required autocomplete="off">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-login user" id="loginBtn">Masuk ke Aplikasi User</button>
        <div id="loginError" class="error-message"></div>
      </form>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    let selectedPortal = 'user';

    // Tab switching
    document.getElementById('tabUser').addEventListener('click', function() {
      selectedPortal = 'user';
      document.getElementById('tabUser').classList.add('active');
      document.getElementById('tabAdmin').classList.remove('active');
      document.getElementById('loginBtn').textContent = 'Masuk ke Aplikasi User';
      document.getElementById('loginBtn').className = 'btn-login user';
    });

    document.getElementById('tabAdmin').addEventListener('click', function() {
      selectedPortal = 'admin';
      document.getElementById('tabAdmin').classList.add('active');
      document.getElementById('tabUser').classList.remove('active');
      document.getElementById('loginBtn').textContent = 'Masuk ke Admin Panel';
      document.getElementById('loginBtn').className = 'btn-login admin';
    });

    // Cek session
    (function checkAuth() {
      const email = localStorage.getItem('userEmail');
      const role = localStorage.getItem('userRole');
      const expiry = Number(localStorage.getItem('loginExpiry'));
      if (email && role && Date.now() < expiry) {
        if (role === 'admin') {
          window.location.replace('/admin');
        } else {
          window.location.replace('/user');
        }
      }
    })();

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');

      btn.disabled = true;
      btn.textContent = 'Memproses...';
      errorDiv.textContent = '';

      try {
        const result = await callApi('login', { email, password });
        
        if (result.success) {
          // Validasi role sesuai portal yang dipilih
          if (selectedPortal === 'admin' && result.role !== 'admin') {
            throw new Error('Akun ini bukan admin. Gunakan portal User.');
          }
          if (selectedPortal === 'user' && result.role === 'admin') {
            // Admin boleh masuk ke user portal (opsional)
          }

          localStorage.setItem('userEmail', result.email);
          localStorage.setItem('username', result.username);
          localStorage.setItem('userRole', result.role);
          localStorage.setItem('loginExpiry', Date.now() + (8 * 60 * 60 * 1000));

          if (selectedPortal === 'admin') {
            window.location.replace('/admin');
          } else {
            window.location.replace('/user');
          }
        } else {
          throw new Error(result.error || 'Login gagal');
        }
      } catch (err) {
        errorDiv.textContent = err.message;
        btn.disabled = false;
        btn.textContent = selectedPortal === 'user' ? 'Masuk ke Aplikasi User' : 'Masuk ke Admin Panel';
      }
    });
  </script>
</body>
</html>
