<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurban Digital - Login</title>
  <!-- CSS Internal sementara (jika file eksternal error) -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #1B5432;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 28px;
      padding: 32px 26px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-emblem {
      width: 60px;
      height: 60px;
      margin: 0 auto 18px;
      background: #1B5432;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 {
      font-family: 'Lora', serif;
      color: #1B5432;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: #7A9882;
      margin-bottom: 26px;
    }
    .form-group {
      margin-bottom: 13px;
      text-align: left;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: #3D5C47;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #D0EBDB;
      border-radius: 10px;
      font-size: 15px;
      background: #F7F8F5;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1B5432;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error-message {
      color: #C94040;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-emblem">🐄</div>
    <h1>Kurban Digital</h1>
    <p class="login-sub">Dokumentasi & monitoring kurban</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="nama@email.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Masuk</button>
      <div id="loginError" class="error-message"></div>
    </form>
  </div>

  <!-- API Config -->
  <script>
  
    async function callApi(action, data = {}) {
      try {
        const response = await fetch(API_BASE_URL + '?action=' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        return await response.json();
      } catch (error) {
        console.error('API Error:', error);
        return { success: false, error: 'Gagal terhubung ke server' };
      }
    }
  </script>

  <script src="assets/js/api.js"></script>

  <script>
    // Jalankan setelah DOM siap
    document.addEventListener('DOMContentLoaded', function() {
      
      // Fungsi cek auth
      function checkAuth() {
        const email = localStorage.getItem('userEmail');
        const role = localStorage.getItem('userRole');
        const expiry = Number(localStorage.getItem('loginExpiry'));

        if (!email || !role || isNaN(expiry) || Date.now() > expiry) {
          localStorage.clear();
          return null;
        }
        return { email, role, username: localStorage.getItem('username') };
      }

      // Cek session saat ini
      const auth = checkAuth();
      if (auth) {
        if (auth.role === 'admin') {
          window.location.replace('/admin');
        } else {
          window.location.replace('/user');
        }
        return; // Hentikan eksekusi
      }

      // Ambil elemen form (pastikan sudah ada)
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');

      // Fungsi login
      async function handleLogin(e) {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
          errorDiv.textContent = 'Email dan password harus diisi';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Memproses...';
        errorDiv.textContent = '';

        try {
          const result = await callApi('login', { email, password });
          
          if (result.success) {
            localStorage.setItem('userEmail', result.email);
            localStorage.setItem('username', result.username);
            localStorage.setItem('userRole', result.role);
            localStorage.setItem('loginExpiry', Date.now() + (8 * 60 * 60 * 1000));
            
            if (result.role === 'admin') {
              window.location.replace('/admin');
            } else {
              window.location.replace('/user');
            }
          } else {
            errorDiv.textContent = result.error || 'Login gagal';
            btn.disabled = false;
            btn.textContent = 'Masuk';
          }
        } catch (err) {
          errorDiv.textContent = 'Gagal terhubung ke server';
          btn.disabled = false;
          btn.textContent = 'Masuk';
        }
      }

      // Pasang event listener
      form.addEventListener('submit', handleLogin);
    });
  </script>
</body>
</html>
